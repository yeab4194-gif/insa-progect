services:
  - type: web
    name: secureauth
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "false"
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      # Set these manually in the Render dashboard — do NOT commit real values:
      # MAIL_USERNAME, MAIL_PASSWORD, MAIL_DEFAULT_SENDER
      # DATABASE_URL  (add a Render PostgreSQL database and it sets this automatically)
